name: "tton_sex_start"
description: "Reaction when OStim started"

eventCriteria:
  eventType: "tton_event"
  schemaConditions:
    - fieldPath: "tton_type"
      operator: "equals"
      value: "sex_start"
      caseSensitive: false
    - fieldPath: "skipTrigger"
      operator: "equals"
      value: false

response:
  type: "direct_narration"
  content: "The encounter begins — {{originator}} reacts, unfiltered, carrying everything that came before."

audience: "nearby_npcs"

enabled: true
interrupt: false
probability: 1
cooldownSeconds: 30
priority: 2

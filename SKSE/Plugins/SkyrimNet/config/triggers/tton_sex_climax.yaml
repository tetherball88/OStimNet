name: "tton_sex_climax"
description: "NPC's reaction when climaxed"

eventCriteria:
  eventType: "tton_event"
  schemaConditions:
    - fieldPath: "tton_type"
      operator: "equals"
      value: "climax"
      caseSensitive: false
    - fieldPath: "skipTrigger"
      operator: "equals"
      value: false

response:
  type: "direct_narration"
  content: "{{ originator }} reacts appropriately to climax event. It can be as they climaxed or someone else climaxed on or in them or both."

audience: "nearby_npcs"

enabled: true
interrupt: true
probability: 1
cooldownSeconds: 30
priority: 10

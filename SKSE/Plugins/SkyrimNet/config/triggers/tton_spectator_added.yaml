name: "tton_spectator_added"
description: "Reaction when a spectator was added to a scene in OStim"

eventCriteria:
  eventType: "tton_event"
  schemaConditions:
    - fieldPath: "tton_type"
      operator: "equals"
      value: "spectator_added"
      caseSensitive: false
    - fieldPath: "skipTrigger"
      operator: "equals"
      value: false

response:
  type: "direct_narration"
  content: "{{ originator }} reacts to ongoing intimate scene."

audience: "nearby_npcs"

enabled: true
interrupt: false
probability: 1
cooldownSeconds: 30
priority: 1

plugin:
  name: "OStimNet"
  version: "2.1.0"
  description: "Ostim-SkyrimNet integration mod."
  icon: "🔥"

schema:
  fields:
    # General
    - name: Use custom descriptions
      path: "tton.settings.useCustomDescriptions"
      type: "bool"
      description: "By disabling this it will use autogenerated descriptions always. It can be useful for people who don't want hardcoded pronounces/organs(like penis instead of strapon) in custom descriptions. Auto generated descriptions have 3 possible genders/sex: female, male, futa. Auto generated descriptions also can specify if it is penis or strapon. Custom generated descriptions are usually have more correct visualization of what's going in scene."
      defaultValue: true
      category: "General"
    - name: "Care scene duration (seconds)"
      path: "tton.settings.nonSexualDuration"
      type: "int"
      description: "How long care scenes last before automatically ending."
      defaultValue: 20
      category: "General"
    - name: "OStim scene change debounce (seconds)"
      path: "tton.settings.ostimSceneChangeDebounce"
      type: "int"
      description: "When OStimNet receives a scene change, it will wait this many seconds of silence before firing the event. This helps prevent rapid consecutive scene changes from triggering multiple events."
      defaultValue: 2
      category: "General"
    - name: "Climax debounce (seconds)"
      path: "tton.settings.climaxDebounce"
      type: "int"
      description: "When an actor climaxes, wait this many seconds before dispatching the climax batch event. Helps to combine multiple climaxes in short period of time."
      defaultValue: 2
      category: "General"
    - name: "Speed change debounce (seconds)"
      path: "tton.settings.speedChangeDebounce"
      type: "int"
      description: "When animation speed changes, wait this many seconds before dispatching the speed change event."
      defaultValue: 5
      category: "General"
    - name: "Game Master LLM variant:"
      path: "tton.gm.gmLlmVariant"
      type: "select"
      description: "Select the variant of the Game Master LLM to use."
      defaultValue: "gamemaster_evaluation"
      options:
        - default
        - AgentDefault
        - CharacterProfileGeneration
        - DiaryGeneration
        - UniversalTranslator
        - action_evaluation
        - combat
        - gamemaster_evaluation
        - memory
        - vision
      category: "General"
    - name: "Nearby actors scan radius"
      path: "tton.nearbyActors.radius"
      type: "int"
      description: "Search radius in game units to find potential candidates for scenes. 1 game unit ≈ 14.3 mm. Default 2000 ≈ 28 m."
      min: 100
      max: 10000
      defaultValue: 2000
      category: "General"
    - name: "Proximity pause radius"
      path: "tton.settings.proximityPauseRadius"
      type: "float"
      description: "Units from an NPC thread actor at which scene advancement is paused. Set it to 0 never pause scenes. 1 game unit ≈ 14.3 mm. Default 200 ≈ 2.8 m."
      min: 100
      max: 1500
      defaultValue: 200
      category: "General"
    - name: "Enable thread phases"
      path: "tton.settings.enableThreadPhases"
      type: "bool"
      description: "When enabled, sexual scenes progress gradually through phases (undressing → foreplay → oral → sex). Each intent has its own phase sequence — romantic starts with undressing, lustful skips to foreplay, dom/aggressive go straight to sex. When disabled, scene selection uses the original random behaviour."
      defaultValue: true
      category: "General"
    - name: "Log level"
      path: "tton.settings.logLevel"
      type: "select"
      description: "Controls which messages are written to OstimNet.log. Use 'info' for normal play. Switch to 'debug' only when diagnosing issues — it produces a large volume of output."
      options:
        - "debug"
        - "info"
        - "warn"
        - "error"
      defaultValue: "info"
      category: "General"

    # Hot keys
    - name: "Toggle mute"
      path: "tton.controls.toggleMuteHotkey"
      type: "hotkey"
      description: "Hotkey to toggle Mute. It overrides Toggle mute in current session, resets to Toggle mute after game reload."
      min: 1
      max: 255
      required: true
      category: "Hot Keys"
      supportsOverride: false
    - name: "Location scan"
      path: "tton.controls.locationScanHotkey"
      type: "hotkey"
      description: "Hotkey to manually trigger a location participant scan at any time."
      min: 1
      max: 255
      required: false
      category: "Hot Keys"
      supportsOverride: false

    # Intents
    - name: OStim scenes intent rule
      path: "tton.settings.ostimScenesIntentRule"
      type: "bool"
      description: "OStimNet has 2 levels of intent. OStimNet started sexual threads can have different intents: none, romantic, transactional, dom, aggressive.
        \n Each scene can have intent. For example scenes where actors holding hands and looking each other in eyes with clear sensual romantic dynamic - marked as romantic.
        \n On contrary if scene have clearly aggressive dynamics can be marked either Dom or Aggressive.
        \n If scene doesn't have any specific dynamics or signs it won't have intent.
        \n All intents are manually assigned. You can use OStim Navigator to change scenes intent.
        \n When start or change sex action is fired it will be searching for appropriate scene.
        \n If this setting is enabled it follow this rule:
        \n Romantic: will select scenes without intent, with platonic, lustful or romantic intent.
        \n Lustful: will select scenes without intent, with lustful or romantic intent.
        \n Transactional: will select scenes without intent, with romantic, lustful or with transactional intent.
        \n Dom: will select scenes without intent or with dom intent.
        \n Aggressive: will select scenes without intent or with aggressive intent.
        \n If this setting is disabled it will search random scene with any intent. It can lead to some weird situations like romantic thread with aggressive scene or vice versa."
      defaultValue: true
      category: "Intents"
    - name: "Enable aggressive intent"
      path: "tton.settings.enableAggressiveIntent"
      type: "bool"
      description: "If enabled, OStimNet will consider aggressive intent when selecting scenes."
      defaultValue: false
      category: "Intents"
    - name: "Show confirmation modal for actions with aggressive intent"
      path: "tton.settings.showConfirmationModalForAggressiveIntent"
      type: "bool"
      description: "If enabled, OStimNet will show a confirmation modal for actions with aggressive intent."
      defaultValue: false
      category: "Intents"

    # Comments
    - name: "Comments prioritize nearest thread"
      path: "tton.settings.commentsPrioritizeNearestThread"
      type: "bool"
      description: "If enabled, comments triggering mechanics will prioritize the nearest thread to the player's current location.
        \nObviously, if player's thread is running it will prioritize it over any other thread.
        \nIf disabled it will work as \"first-come-first-served\" if farest npc's thread triggered comment, closer threads might be silent(even player's) due to triggers cooldown.
        \nAll events are still logged. It only affects triggers."
      defaultValue: true
      category: "Comments"
    - name: "Comment gender priority(0 - always male, 100 - always female)"
      path: "tton.settings.commentGenderPriority"
      type: "int"
      min: 0
      max: 100
      defaultValue: 50
      description: "% chance during scene which gender will be prioritized in comments triggering mechanics. 50% equal chance, 0% male always, 100% female always.
        \nDoesn't apply to climax comments, it uses smarter approach and rules: it checks who climaxed, if multiple actors climaxed it selects those who climaxed harder, if everyone climaxed equally it selects npc who is a target for most climaxed actors, only if everything everywhere equal it will use this setting."
      category: "Comments"
    - name: "Mute comments"
      path: "tton.controls.toggleMute"
      type: "bool"
      defaultValue: false
      description: "Toggle npcs comments during scenes. It will mute/unmute all npcs comments."
      category: "Comments"

    # Spectators
    - name: "Enable spectators"
      path: "tton.settings.enableSpectators"
      type: "bool"
      description: "If enabled, OStimNet will scan nearby actors and try to find if any nearby actors not in adult scenes match to any actors in scenes with relationships spouse/courting or lover and make them come closer to scene and confront(how things go from this point depends on LLM)."
      defaultValue: true
      category: "Spectators"
    - name: "Spectator scan interval (seconds)"
      path: "tton.spectators.scanIntervalSeconds"
      type: "int"
      description: "How often to scan for new spectators while scenes are running."
      defaultValue: 5
      min: 1
      max: 60
      category: "Spectators"
    - name: "Spectator scan radius"
      path: "tton.spectators.scanRadius"
      type: "int"
      description: "Search radius in game units to find potential spectators. Default 3000 ≈ 43 m."
      min: 500
      max: 10000
      defaultValue: 3000
      category: "Spectators"

    # Actions
    - name: "Actions cooldown (seconds)"
      path: "tton.settings.actionsCooldown"
      type: "int"
      description: "Cooldown time in seconds per action per originator actor. It can help to prevent same actor spamming same action."
      defaultValue: 20
      category: "Actions"
    - name: "Actions decline cooldown (seconds)"
      path: "tton.settings.actionsDeclineCooldown"
      type: "int"
      description: "Cooldown time in seconds per action per originator actor when the action is declined by player. Set it higher than \"Actions cooldown\" to make decline more meaningful."
      defaultValue: 40
      category: "Actions"
    - name: "Confirmation modal for NPC-only scenes"
      path: "tton.settings.showConfirmationModalWithNoPlayer"
      type: "bool"
      description: "If enabled, OStimNet will show a confirmation modal for NPC-only scenes (scenes where the player character is not a participant). By default this is disabled and such scenes auto-accept."
      defaultValue: false
      category: "Actions"

    # Location Scan
    - name: "Enable location scan"
      path: "tton.locationScan.enabled"
      type: "bool"
      description: "When enabled, OStimNet will scan nearby NPCs for willing participants after each location change and suggest an intimate scene. The scan fires after a short delay to allow NPCs to fully spawn."
      defaultValue: true
      category: "Location Scan"
    - name: "Location scan delay (seconds)"
      path: "tton.locationScan.delaySeconds"
      type: "int"
      description: "Seconds to wait after a loading screen closes before scanning for participants. Increase if NPCs haven't fully spawned by the time the scan fires."
      min: 1
      max: 60
      defaultValue: 8
      category: "Location Scan"
    - name: "Location scan cooldown (seconds)"
      path: "tton.locationScan.cooldownSeconds"
      type: "int"
      description: "Minimum seconds that must pass between two consecutive automatic location scans. Set to 0 to disable the cooldown. Manual hotkey scans always bypass this cooldown."
      min: 0
      max: 3600
      defaultValue: 120
      category: "Location Scan"
    - name: "Scan in settlements"
      path: "tton.locationScan.scanInSettlements"
      type: "bool"
      description: "Allow location scans when the player is inside a town, city, or settlement."
      defaultValue: true
      category: "Location Scan"
    - name: "Scan in inns"
      path: "tton.locationScan.scanInInns"
      type: "bool"
      description: "Allow location scans when the player is inside an inn."
      defaultValue: true
      category: "Location Scan"
    - name: "Scan in guilds"
      path: "tton.locationScan.scanInGuilds"
      type: "bool"
      description: "Allow location scans when the player is inside a guild hall."
      defaultValue: true
      category: "Location Scan"
    - name: "Scan in player homes"
      path: "tton.locationScan.scanInPlayerHomes"
      type: "bool"
      description: "Allow location scans when the player is inside their own home (LocTypePlayerHouse)."
      defaultValue: true
      category: "Location Scan"
    - name: "Scan in dwellings"
      path: "tton.locationScan.scanInDwellings"
      type: "bool"
      description: "Allow location scans when the player is inside a dwelling or house (LocTypeDwelling / LocTypeHouse)."
      defaultValue: true
      category: "Location Scan"
    - name: "Scan in dungeons"
      path: "tton.locationScan.scanInDungeons"
      type: "bool"
      description: "Allow location scans when the player is inside a dungeon."
      defaultValue: false
      category: "Location Scan"
    - name: "Scan in other locations"
      path: "tton.locationScan.scanInOther"
      type: "bool"
      description: "Allow location scans when the player is in a location that does not match any recognised type, or has no named location."
      defaultValue: true
      category: "Location Scan"

    # Game Master - Scheduled
    - name: "Player thread"
      path: "tton.gameMaster.scheduledEvalPlayerThread"
      type: "bool"
      description: "Automatically advance player's scene every N seconds"
      defaultValue: false
      category: "AI scene advancement"
    - name: "NPC threads"
      path: "tton.gameMaster.scheduledEvalNpcThreads"
      type: "bool"
      description: "Automatically advance NPC-only scenes every N seconds"
      defaultValue: true
      category: "AI scene advancement"
    - name: "Interval (seconds)"
      path: "tton.gameMaster.scheduledEvalIntervalSeconds"
      type: "int"
      description: "Seconds between scene change evaluations"
      min: 10
      max: 600
      defaultValue: 60
      category: "AI scene advancement"

    # Undressing
    - name: "Enable undressing(player thread)"
      path: "tton.undress.enableUndressingPlayer"
      type: "bool"
      description: "Enable undressing in player thread"
      defaultValue: true
      category: "Undressing"
    - name: "Enable undressing(npc thread)"
      path: "tton.undress.enableUndressingNpc"
      type: "bool"
      description: "Enable undressing in npc thread"
      defaultValue: true
      category: "Undressing"
    - name: "Undressing approach(player thread)"
      path: "tton.undress.undressingApproachPlayer"
      type: "select"
      description: "Select the undressing approach to use in player thread.\nOStim: Default undressing approach, second actor undresses themself, second actor undresses first.\nOARE: Normal undressing speed, second actor mostly undresses themself, first actor helps with top cloth. Second actor undresses first.\nOSA: Slowest undressing, first actor helps second actor to undress all parts of clothing. Second actor helps first actor to undress all parts of clothing. First actor undresses first.\nOSAFirstFast: Faster than OSA undressing, first actor helps second actor to undress all parts of clothing. Second actor helps first actor to undress fast."
      options:
        - "OStim"
        - "OARE"
        - "OSA"
        - "OSAFirstFast"
      defaultValue: "OStim"
      category: "Undressing"
    - name: "Undressing approach(npc thread)"
      path: "tton.undress.undressingApproachNpc"
      type: "select"
      description: "Select the undressing approach to use in npc-npc thread.\nOStim: Default undressing approach, second actor undresses themself, second actor undresses first.\nOARE: Normal undressing speed, second actor mostly undresses themself, first actor helps with top cloth. Second actor undresses first.\nOSA: Slowest undressing, first actor helps second actor to undress all parts of clothing. Second actor helps first actor to undress all parts of clothing. First actor undresses first.\nOSAFirstFast: Faster than OSA undressing, first actor helps second actor to undress all parts of clothing. Second actor helps first actor to undress fast."
      options:
        - "OStim"
        - "OARE"
        - "OSA"
        - "OSAFirstFast"
      defaultValue: "OStim"
      category: "Undressing"


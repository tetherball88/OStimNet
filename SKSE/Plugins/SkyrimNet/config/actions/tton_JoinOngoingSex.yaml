name: JoinOngoingSex
description: "{{render_template(\"helpers/ostimnet_action_join_ongoing_sex\")}}"
questEditorId: TTON_MainController
scriptName: TTON_Actions
executionFunctionName: JoinOngoingSexActionExecute
parameterMapping:
  - type: speaker
    name: akActor
    description: Speaker Actor parameter (triggering entity)
  - type: dynamic
    name: participant1
    description: Person in scene to interact with
    useNearbyActors: false
enabled: true
eligibilityRules:
  - conditions:
      - decoratorName: get_global_value
        arguments:
          - TTON_IsOstimActive
        comparisonOperator: ==
        expectedValue: 1
      - decoratorName: is_in_faction
        arguments:
          - currentActor
          - SexLabAnimatingFaction
        comparisonOperator: ==
        expectedValue: false
      - decoratorName: is_in_faction
        arguments:
          - currentActor
          - OStimActorCountFaction
        comparisonOperator: ==
        expectedValue: false
      - decoratorName: is_in_combat
        arguments:
          - currentActor
        comparisonOperator: ==
        expectedValue: false
      - decoratorName: has_magic_effect
        arguments:
          - currentActor
          - TTON_DeclineJoinOngoingSexEffect
        comparisonOperator: ==
        expectedValue: false
      - decoratorName: decnpc
        arguments:
          - currentActor
        comparisonOperator: ==
        expectedValue: false
        resultPath: isChild
  - conditions:
      - decoratorName: get_global_value
        arguments:
          - skyrimnet_sexlab_ostim_player
        comparisonOperator: ==
        expectedValue: 1
      - decoratorName: is_plugin_loaded
        arguments:
          - SkyrimNet_SexLab.esp
        comparisonOperator: ==
        expectedValue: false
    logicalOperator: OR
customCategory: TTON_CategoryStart
name: JoinOngoingSex
description: "{{render_template(\"ostimnet_actions/ostimnet_action_join_ongoing_sex\")}}"
questEditorId: TTON_MainController
scriptName: TTON_Actions
executionFunctionName: JoinOngoingSexActionExecute
parameterMapping:
  - type: speaker
    name: akActor
    description: Speaker Actor parameter (triggering entity)
  - type: dynamic
    name: participant1
    description: Person in ongoing sexual scene to interact with
    useNearbyActors: false
  - type: dynamic
    name: intent
    description: romantic|lustful|transactional|dom|aggressive
  - type: dynamic
    name: reasoning
    description: Explain why you selected parameters. 1-2 short sentences.
enabled: true
eligibilityRules:
  - conditions:
      - decoratorName: get_global_value
        arguments:
          - TTON_IsOstimActive
        comparisonOperator: ==
        expectedValue: 1
      - decoratorName: is_join_ongoing_sex_available
        arguments:
          - currentActor
        comparisonOperator: ==
        expectedValue: "available"

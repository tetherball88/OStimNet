customCategory: TTON_CategoryManage
name: ChangeSexSceneIntent
description: "{{render_template(\"ostimnet_actions/ostimnet_action_change_sex_scene_intent\")}}"
questEditorId: TTON_MainController
scriptName: TTON_Actions
executionFunctionName: ChangeSexSceneIntentExecute
parameterMapping:
  - type: speaker
    name: akActor
    description: Speaker Actor parameter (triggering entity)
  - type: dynamic
    name: initiator
    description: Actor's display name who actually initiated the action. For dom and aggressive intent, it should be one of dominant/aggressor actors, not submissive/victim.
    useNearbyActors: false
  - type: dynamic
    name: intent
    description: romantic|lustful|transactional|dom|aggressive
  - type: dynamic
    name: reasoning
    description: Explain why you selected parameters. 1-2 short sentences.
enabled: true
eligibilityRules:
  - conditions:
      - decoratorName: is_sex_scene_intent_change_available
        arguments:
          - currentActor
        comparisonOperator: ==
        expectedValue: "available"


name: SpectatorOfSex
description: "{{render_template(\"ostimnet_actions/ostimnet_action_spectate_sex\")}}"
questEditorId: TTON_MainController
scriptName: TTON_Actions
executionFunctionName: SpectatorOfSexActionExecute
parameterMapping:
  - type: speaker
    name: akActor
    description: Speaker Actor parameter (triggering entity)
  - type: dynamic
    name: target
    description: Person in sex scene to watch (spectate)
    useNearbyActors: false
enabled: true
eligibilityRules:
  - conditions:
      - decoratorName: is_spectate_sex_available
        arguments:
          - currentActor
        comparisonOperator: ==
        expectedValue: "available"

name: SpectatorOfSex
description: "{{render_template(\"helpers/ostimnet_action_spectate_sex\")}}"
questEditorId: TTON_MainController
scriptName: TTON_Actions
executionFunctionName: SpectatorOfSexActionExecute
parameterMapping:
  - type: speaker
    name: akActor
    description: Speaker Actor parameter (triggering entity)
  - type: dynamic
    name: target
    description: Person in sex scene to watch (spectate)
    useNearbyActors: false
enabled: true
eligibilityRules:
  - conditions:
      - decoratorName: get_global_value
        arguments:
          - TTON_IsOstimActive
        comparisonOperator: ==
        expectedValue: 1
      - decoratorName: is_in_faction
        arguments:
          - currentActor
          - OStimActorCountFaction
        comparisonOperator: ==
        expectedValue: false
      - decoratorName: is_in_combat
        arguments:
          - currentActor
        comparisonOperator: ==
        expectedValue: false
      - decoratorName: is_in_faction
        arguments:
          - currentActor
          - TTON_SpectatorFaction
        comparisonOperator: ==
        expectedValue: false
      - decoratorName: decnpc
        arguments:
          - currentActor
        comparisonOperator: ==
        expectedValue: false
        resultPath: isChild

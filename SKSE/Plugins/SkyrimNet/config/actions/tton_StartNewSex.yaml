customCategory: TTON_CategoryStart
name: StartNewSex
description: "{{render_template(\"ostimnet_actions/ostimnet_action_start_new_sex\")}}"
questEditorId: TTON_MainController
scriptName: TTON_Actions
executionFunctionName: StartSexActionExecute
parameterMapping:
  - type: speaker
    name: akActor
    description: Speaker Actor parameter (triggering entity)
  - type: dynamic
    name: participant1
    description: Display name of the primary partner, exactly as listed under available partners. Leave empty only for solo/masturbation scenes.
    useNearbyActors: false
    optional: true
  - type: dynamic
    name: participant2
    description: Display name of an additional participant for group sex. Only include if the scene explicitly involves more than 2 people.
    useNearbyActors: false
    optional: true
  - type: dynamic
    name: participant3
    description: Display name of an additional participant for group sex. Only include if the scene explicitly involves more than 3 people.
    useNearbyActors: false
    optional: true
  - type: dynamic
    name: participant4
    description: Display name of an additional participant for group sex. Only include if the scene explicitly involves more than 4 people.
    useNearbyActors: false
    optional: true
  - type: dynamic
    name: furniture
    description: Select furniture from list, return exact furniture type. Floor only when urgency is overwhelming or no other option exists. Priority - bed(best privacy comfort) > situational furniture(better variety and unexpected positions) > floor as last resort.
  - type: dynamic
    name: intent
    description: "romantic|lustful|transactional|dom|aggressive"
  - type: dynamic
    name: reason
    description: Short 1-2 sentence reason why LLM decided to initiate this action with these participants, intent and furniture.
enabled: true
eligibilityRules:
  - conditions:
      - decoratorName: is_start_new_sex_available
        arguments:
          - currentActor
        comparisonOperator: ==
        expectedValue: "available"

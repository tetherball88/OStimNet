name: StartNewSex
description: "{{render_template(\"helpers/ostimnet_action_start_new_sex\")}}"
questEditorId: TTON_MainController
scriptName: TTON_Actions
executionFunctionName: StartSexActionExecute
parameterMapping:
  - type: speaker
    name: akActor
    description: Speaker Actor parameter (triggering entity)
  - type: dynamic
    name: participant1
    description: Primary partner (empty for solo)
    useNearbyActors: false
    optional: true
  - type: dynamic
    name: participant2
    description: Optional 2nd partner
    useNearbyActors: false
    optional: true
  - type: dynamic
    name: participant3
    description: Optional 3rd partner
    useNearbyActors: false
    optional: true
  - type: dynamic
    name: participant4
    description: Optional 4th partner
    useNearbyActors: false
    optional: true
  - type: dynamic
    name: activity
    description: Activity from list
  - type: dynamic
    name: furn
    description: Furniture from list
    optional: true
enabled: true
eligibilityRules:
  - conditions:
      - decoratorName: get_global_value
        arguments:
          - skyrimnet_sexlab_ostim_player
        comparisonOperator: ==
        expectedValue: 1
      - decoratorName: is_in_faction
        arguments:
          - currentActor
          - SexLabAnimatingFaction
        comparisonOperator: ==
        expectedValue: false
      - decoratorName: is_in_faction
        arguments:
          - currentActor
          - OStimActorCountFaction
        comparisonOperator: ==
        expectedValue: false
      - decoratorName: is_in_faction
        arguments:
          - currentActor
          - ChildFaction
        comparisonOperator: ==
        expectedValue: false
      - decoratorName: is_in_combat
        arguments:
          - currentActor
        comparisonOperator: ==
        expectedValue: false
      - decoratorName: has_magic_effect
        arguments:
          - currentActor
          - TTON_DeclineStartNewSexEffect
        comparisonOperator: ==
        expectedValue: false
      - decoratorName: decnpc
        arguments:
          - currentActor
        comparisonOperator: ==
        expectedValue: false
        resultPath: isChild

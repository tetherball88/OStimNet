customCategory: TTON_CategoryManage
name: InviteToYourSex
description: "{{render_template(\"ostimnet_actions/ostimnet_action_invite_to_your_sex\")}}"
questEditorId: TTON_MainController
scriptName: TTON_Actions
executionFunctionName: InviteToYourSexExecute
parameterMapping:
  - type: speaker
    name: akActor
    description: Speaker Actor parameter (triggering entity)
  - type: dynamic
    name: participant1
    description: First invitee (required)
    useNearbyActors: false
  - type: dynamic
    name: participant2
    description: Second invitee (optional)
    useNearbyActors: false
    optional: true
  - type: dynamic
    name: participant3
    description: Third invitee (optional)
    useNearbyActors: false
    optional: true
  - type: dynamic
    name: reasoning
    description: Explain why you selected parameters. 1-2 short sentences.
enabled: true
eligibilityRules:
  - conditions:
      - decoratorName: is_invite_to_your_sex_available
        arguments:
          - currentActor
        comparisonOperator: ==
        expectedValue: "available"

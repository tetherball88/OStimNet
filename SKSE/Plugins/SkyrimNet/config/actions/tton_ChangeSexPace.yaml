name: ChangeSexScenePace
description: "{{render_template(\"ostimnet_actions/ostimnet_action_change_sex_scene_pace\")}}"
questEditorId: TTON_MainController
scriptName: TTON_Actions
executionFunctionName: ChangeSexScenePaceActionExecute
parameterMapping:
  - type: speaker
    name: akActor
    description: Speaker Actor parameter (triggering entity)
  - type: dynamic
    name: speed
    description: increase|decrease
customCategory: TTON_CategoryManage
enabled: true
eligibilityRules:
  - conditions:
      - decoratorName: is_sex_scene_pace_change_available
        arguments:
          - currentActor
        comparisonOperator: ==
        expectedValue: available
  - conditions:
      - decoratorName: currentTime
        comparisonOperator: ==
        expectedValue: ""
    logicalOperator: OR